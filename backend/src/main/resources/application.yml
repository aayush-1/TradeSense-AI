spring:
  application:
    name: tradesense-backend
  # Breeze test keys: use profile "local" + gitignored application-local.yml (see repo .gitignore).

tradesense:
  yahoo:
    chart-base-url: https://query1.finance.yahoo.com/v8/finance/chart
    quote-summary-base-url: https://query2.finance.yahoo.com/v10/finance/quoteSummary
    # Comma-separated modules for quoteSummary (see FundamentalSnapshot javadoc)
    quote-summary-modules: assetProfile,summaryProfile,summaryDetail,defaultKeyStatistics,financialData,calendarEvents
  fundamentals:
    # Skip Yahoo quoteSummary if snapshot on disk is newer than this many days (GET /recommendations uses same TTL).
    max-age-days: 90
  recommendations:
    # Weighted fraction of (buy votes × weight) must reach this threshold for overall buy (see WeightedRecommendationAggregator).
    aggregation-buy-threshold: 0.5
    strategy-weights:
      breakout-volume-v1: 1.2
      trend-ma-cross-v1: 1.5
      mean-revert-vwap-proxy-v1: 0.9
      rsi-volume-v1: 1.0
      accumulation-pressure-v1: 1.1
      pullback-uptrend-v1: 1.25
    # ATR% = ATR(14)/last close. Adds symbol "notes" only; does not change buy votes (see AtrVolatilityNotes).
    atr-gate:
      enabled: true
      atr-period: 14
      note-high-atr-pct: 0.07
      note-low-atr-pct: 0.004
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://127.0.0.1:5173
  # ICICI Breeze: set enabled true and supply credentials via env (do not commit secrets).
  # ICICI_BREEZE_API_SESSION = apisession value from https://api.icicidirect.com/apiuser/login?api_key=...
  breeze:
    enabled: false
    api-key: ${ICICI_BREEZE_API_KEY:}
    secret-key: ${ICICI_BREEZE_SECRET_KEY:}
    api-session: ${ICICI_BREEZE_API_SESSION:}
  storage:
    # Relative to JVM user.dir (cwd). Example: mvn from backend/ → backend/data/ohlc/*.json ; from repo root → data/ohlc/
    ohlc-directory: data/ohlc
    # Yahoo quoteSummary (or other) fundamental snapshots per symbol
    fundamentals-directory: data/fundamentals
  market:
    # Yahoo-only: set false and configure Breeze when ICICI is working again.
    yahoo-only: true
    breeze-then-yahoo-fallback: false
    breeze-only: false
